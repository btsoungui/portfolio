<section id="tete" aria-label="Portrait de Bryan">
  <div class="cadre">
    <div class="photo-frame" aria-hidden="true"></div>

    <figure class="photo-card">
      <img
        src="{{ portraitUrl }}"
        alt="Portrait de Bryan"
        width="420"
        height="560"
      />
      <figcaption>
        <span class="photo-label">{{ authorName }}</span>
        <strong>{{ role }}</strong>
        <span>{{ caption }}</span>
      </figcaption>
      <a class="cv-download" href="{{ cvUrl }}" download="{{ cvFilename }}">
        <i class="fas fa-download" aria-hidden="true"></i>
        Télécharger mon CV
      </a>
    </figure>
  </div>
</section>
